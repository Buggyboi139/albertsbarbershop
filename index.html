<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert's Barbershop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Albert's</div>
            <ul class="nav-links">
                <li><a href="#service">Service</a></li>
                <li><a href="#location">Location</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Albert's Barber Shop</h1>
            <p>A traditional grooming experience.</p>
        </div>
    </section>

    <section id="service" class="services">
        <h2>Our Service</h2>
        <div class="service-grid">
            <div class="service-card">
                <img src="ab3.jpeg" alt="Barber Chair">
                <h3>Gentleman's Haircut</h3>
                <span class="price">$25</span>
            </div>
        </div>
    </section>

    <section id="location" class="location-section">
        <h2>Find Us</h2>
        <div class="location-container">
            <div class="card-wrapper">
                <img src="ab2.png" alt="Albert's Barber Shop Business Card">
            </div>
            <div class="map-panel">
                <iframe src="https://maps.google.com/maps?q=3823%20SW%209th%20St,%20Des%20Moines,%20IA%2050315&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="brand">
                <h2>Albert's Barbershop</h2>
                <p>3823 SW 9th St</p>
                <p>Des Moines, IA 50315</p>
            </div>
        </div>
    </footer>
</body>
</html>
